<!-- Futuristic Made By Intro -->
<div id="intro">
  <canvas id="particles"></canvas>
  <div id="content">
    <h1 id="madeByText">MADE BY</h1>
    <img id="logo" src="images/logo.png" alt="Logo">
  </div>
</div>

<style>
  body {
    margin: 0;
    background: radial-gradient(circle at center, #0f2027, #0a0f1c 70%);
    overflow: hidden;
    font-family: 'Orbitron', sans-serif;
  }

  #intro {
    position: relative;
    height: 100vh;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #content {
    position: relative;
    text-align: center;
    z-index: 2;
  }

  #madeByText {
    font-size: 48px;
    letter-spacing: 6px;
    color: #00f7ff;
    text-shadow: 0 0 10px #00f7ff, 0 0 30px #00f7ff;
    transition: opacity 0.6s ease;
  }

  #logo {
    width: 180px;
    margin-top: 20px;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 1s ease, transform 1s ease;
    filter: drop-shadow(0 0 15px #00f7ff);
  }

  .fade-out {
    opacity: 0;
  }

  .fade-in {
    opacity: 1;
    transform: scale(1);
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }
</style>

<script>
  // Particle background
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particlesArray = [];

  class Particle {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 2;
      this.speedX = (Math.random() - 0.5) * 0.5;
      this.speedY = (Math.random() - 0.5) * 0.5;
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
    }
    draw() {
      ctx.fillStyle = "#00f7ff";
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function initParticles() {
    for (let i = 0; i < 120; i++) {
      particlesArray.push(new Particle());
    }
  }

  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particlesArray.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animateParticles);
  }

  initParticles();
  animateParticles();

  // Text -> Logo transition
  window.addEventListener("load", function () {
    setTimeout(function () {
      document.getElementById("madeByText").classList.add("fade-out");
      document.getElementById("logo").classList.add("fade-in");
    }, 2000);
  });

  // Resize fix
  window.addEventListener("resize", function () {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>
